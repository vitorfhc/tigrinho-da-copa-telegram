# TigrinhoDaCopa — NON-SECRET settings (COMPLETION.md §4.2).
# Copy to `config.yaml` and fill in the required IDs. Secrets go in `.env`, never here.

# --- Required ---------------------------------------------------------------------------------
# The single group chat the bot serves (negative integer for groups/supergroups).
group_chat_id: -1001234567890
# Telegram user id DM'd on errors/limits (must press Start in the bot's DM once).
admin_user_id: 123456789
# The bot's @username without the leading '@' (verified against get_me() at startup).
bot_username: TigrinhoDaCopaBot

# --- Optional (defaults shown) ----------------------------------------------------------------
provider_mode: api_football            # api_football | fake (local/dev)
api_football_base_url: https://v3.football.api-sports.io
wc_league_id: 1                        # FIFA World Cup league id (verify against provider)
wc_season: 2026
timezone: America/Sao_Paulo            # drives sync time, displayed kickoffs, weekly reset
sync_time: "06:00"                     # daily fixtures sync (local time)
palpite_time: "06:00"                  # daily AI palpite generation (local; needs GEMINI_API_KEY)
gemini_model: gemini-3.1-pro-preview   # Gemini model for /palpite
# Daily AI-curated bolãozinho (§24). When daily_bolao_enabled is true, an evening job at
# daily_bolao_time grades the next day's fixtures with Gemini and auto-opens a bolãozinho over
# the best up-to-2 games. Requires GEMINI_API_KEY. Price is in integer cents (1000 = R$ 10,00).
daily_bolao_enabled: false
daily_bolao_time: "18:00"
daily_bolao_entry_price_cents: 1000
poll_interval_seconds: 600             # live-poll cadence during match windows (seconds)
reminder_lead_minutes: 60              # post a betting reminder this long before kickoff
reminder_interval_minutes: 10          # how often the reminder sweep runs
match_window_hours: 3                  # how long after kickoff a game stays "active"
# Post-settlement score reconciliation (§8.3/§9.2): re-check a settled game and re-grade if the
# provider's 90′ outcome changed (late/VAR feed corrections), posting a "Placar corrigido" message.
reconcile_window_hours: 6              # how long after kickoff a settled game stays re-checkable
reconcile_first_delay_minutes: 5      # first re-check this long after settlement (also job tick)
reconcile_interval_minutes: 30        # re-check cadence after the first check
reconcile_budget_reserve: 25          # skip reconcile when fewer than this many requests remain
# Bolãozinhos (Feature 7 / §22): real-money side-competitions over a set of games.
tournament_currency: "R$"             # currency symbol for entry prices/pots/prizes (display only)
tournament_currency_decimals: 2       # decimal places when rendering money (e.g. R$ 10,00)
reminder_max_mentions: 20             # cap entrant @-mentions per reminder before "… +N"
bolaozinho_sweep_interval_minutes: 10 # how often the lock/stuck/rescue sweep runs
# Splitwise integration (Feature 8 / §23): mirror finished bolãozinho results into a shared
# Splitwise group. Active only when SPLITWISE_API_KEY (.env) AND splitwise_group_id are both set.
# splitwise_group_id: 12345678        # the shared Splitwise group all bolãozinho expenses post to
splitwise_base_url: https://secure.splitwise.com/api/v3.0
splitwise_currency_code: BRL          # ISO-4217 code sent to the Splitwise API (display stays R$)
api_daily_cap: 100                     # hard ceiling on provider requests per budget day
api_budget_reset_tz: UTC               # timezone whose midnight resets the request counter
db_path: /data/tigrinho.db             # SQLite file path (mounted volume)
log_level: INFO                        # CRITICAL | ERROR | WARNING | INFO | DEBUG | NOTSET
log_format: json                       # json | console
